<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Open browser console and run the script below to generate PNG icons, then save them as icon-192.png and icon-512.png in this folder.</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Background
  ctx.fillStyle = '#1a0a00';
  ctx.fillRect(0, 0, s, s);
  // Border radius effect (just square for simplicity)
  ctx.fillStyle = '#c9a84c';
  ctx.font = `bold ${Math.floor(s * 0.55)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚔️', s/2, s/2);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

function download(canvas, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
// download(document.getElementById('c192'), 'icon-192.png');
// download(document.getElementById('c512'), 'icon-512.png');
</script>
</body>
</html>
